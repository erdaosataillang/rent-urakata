<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カート</title>
  <link rel="stylesheet" href="common.css">
  <style>
    /* カート固有のスタイル */
    .cart-item { background: var(--card-bg); padding: 32px 40px; border-radius: 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
    .cart-actions { margin-top: 48px; display: flex; flex-direction: column; align-items: flex-end; }
  </style>
</head>
<body>

  <div id="sidebar-container"></div>
  
  <main class="main-content">
    <h2>カート内の機材</h2>
    
    <div id="cart-items-list"></div>
    <div id="cart-actions" class="cart-actions"></div>
  </main>

  <script src="common.js"></script>
  <script>
    initCommonState();
    loadSidebar('cart');

    function renderCart() {
      const list = document.getElementById('cart-items-list');
      const actions = document.getElementById('cart-actions');
      
      let cart = JSON.parse(localStorage.getItem('cartItemIds') || '[]');
      let data = JSON.parse(localStorage.getItem('equipmentData') || '[]');
      const currentUser = localStorage.getItem('currentUser');

      list.innerHTML = '';
      actions.innerHTML = '';

      if (cart.length === 0) {
        list.innerHTML = '<div class="empty-message">カートは空です。</div>';
        return;
      }

      cart.forEach(id => {
        const item = data.find(i => i.id === id);
        if(!item) return;
        const div = document.createElement('div');
        div.className = "cart-item";
        div.innerHTML = `
          <div>
            <div style="font-size:14px; color:var(--text-sub); margin-bottom: 8px; font-weight: bold;">${item.category} / ${item.maker}</div>
            <div style="font-weight:bold; font-size:24px;">${item.name}</div>
          </div>
          <button onclick="removeFromCart('${item.id}')" style="background:none; border:none; color:var(--on-error-container); font-weight:bold; font-size: 16px; cursor:pointer;">削除</button>
        `;
        list.appendChild(div);
      });

      if (!currentUser) {
        actions.innerHTML = `
          <p style="color:var(--text-sub); font-size:16px; margin-bottom: 16px; font-weight: bold;">※レンタル手続きに進むにはログインが必要です。</p>
          <a href="mypage.html" class="btn btn-primary">ログイン画面へ</a>
        `;
      } else {
        actions.innerHTML = `<button class="btn btn-primary" onclick="checkoutCart()">レンタルを確定する</button>`;
      }
    }

    window.removeFromCart = (id) => {
      let cart = JSON.parse(localStorage.getItem('cartItemIds') || '[]');
      cart = cart.filter(i => i !== id);
      localStorage.setItem('cartItemIds', JSON.stringify(cart));
      renderCart();
    };

    window.checkoutCart = () => {
      let cart = JSON.parse(localStorage.getItem('cartItemIds') || '[]');
      let rented = JSON.parse(localStorage.getItem('rentedItemIds') || '[]');
      let data = JSON.parse(localStorage.getItem('equipmentData') || '[]');
      
      cart.forEach(id => {
        const item = data.find(i => i.id === id);
        if (item) item.status = 'rented';
        if (!rented.includes(id)) rented.push(id);
      });
      
      localStorage.setItem('equipmentData', JSON.stringify(data));
      localStorage.setItem('rentedItemIds', JSON.stringify(rented));
      localStorage.setItem('cartItemIds', JSON.stringify([]));
      
      alert('レンタルの手続きが完了しました！');
      window.location.href = 'mypage.html';
    };

    renderCart();
  </script>
</body>
</html>
