<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レンタル機材一覧</title>
  <link rel="stylesheet" href="common.css">
  <style>
    /* 一覧ページ固有のスタイル */
    .search-container { background: var(--card-bg); padding: 32px; border-radius: 28px; margin-bottom: 40px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
    .search-input { width: 100%; box-sizing: border-box; padding: 16px 24px; font-size: 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 100px; background-color: var(--bg-color); outline: none; margin-bottom: 16px; transition: border-color 0.3s; }
    .search-input:focus { border-color: var(--text-sub); }
    .search-filters { display: flex; gap: 16px; }
    .search-select { flex: 1; padding: 16px 24px; font-size: 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 100px; background-color: var(--bg-color); outline: none; cursor: pointer; }
  </style>
</head>
<body>

  <!-- サイドバーがここに挿入されます -->
  <div id="sidebar-container"></div>
  
  <main class="main-content">
    <h2>すべての機材</h2>
    
    <div class="search-container">
      <input type="text" id="search-input" class="search-input" placeholder="機材名で検索...">
      <div class="search-filters">
        <select id="category-select" class="search-select"><option value="">すべてのジャンル</option></select>
        <select id="maker-select" class="search-select"><option value="">すべてのメーカー</option></select>
      </div>
    </div>
    
    <div id="index-items-list" class="grid-list"></div>
  </main>

  <script src="common.js"></script>
  <script>
    initCommonState();
    loadSidebar('index');

    const searchInput = document.getElementById('search-input');
    const categorySelect = document.getElementById('category-select');
    const makerSelect = document.getElementById('maker-select');

    function initFilters(data) {
      const categories = [...new Set(data.map(item => item.category))];
      const makers = [...new Set(data.map(item => item.maker))];
      categories.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; categorySelect.appendChild(o); });
      makers.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; makerSelect.appendChild(o); });
      searchInput.addEventListener('input', renderIndex);
      categorySelect.addEventListener('change', renderIndex);
      makerSelect.addEventListener('change', renderIndex);
    }

    function renderIndex() {
      const data = JSON.parse(localStorage.getItem('equipmentData') || '[]');
      const list = document.getElementById('index-items-list');
      list.innerHTML = '';
      
      const query = searchInput.value.toLowerCase();
      const cat = categorySelect.value;
      const mak = makerSelect.value;

      const filtered = data.filter(item => {
        return item.name.toLowerCase().includes(query) && (cat === '' || item.category === cat) && (mak === '' || item.maker === mak);
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-message">該当する機材がありません。</div>';
        return;
      }

      filtered.forEach(item => {
        const isAvailable = item.status === "available";
        const a = document.createElement('a');
        a.href = `fixture.html?ID=${item.id}`;
        a.className = `item-card status-${item.status}`;
        a.innerHTML = `
          <div>
            <span class="item-category">${item.category} / ${item.maker}</span>
            <h3 class="item-name">${item.name}</h3>
          </div>
          <div class="status-container">
            <span class="status-dot"></span>
            <span class="status-text">${isAvailable ? '貸出可能' : '貸出中'}</span>
          </div>
        `;
        list.appendChild(a);
      });
    }

    initFilters(JSON.parse(localStorage.getItem('equipmentData')));
    renderIndex();
  </script>
</body>
</html>
