<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>機材詳細</title>
  <link rel="stylesheet" href="common.css">
  <style>
    /* 詳細ページ固有のPCレイアウト */
    .fixture-container { display: flex; gap: 48px; align-items: flex-start; max-width: 1000px; }
    .fixture-image-placeholder { flex: 1; min-height: 400px; background-color: var(--tertiary-container); border-radius: 28px; display: flex; align-items: center; justify-content: center; color: var(--on-tertiary-container); font-weight: bold; font-size: 18px; width: 100%; }
    .fixture-info { flex: 1; }
    .back-link { display: inline-block; margin-bottom: 32px; color: var(--text-sub); text-decoration: none; font-weight: bold; font-size: 16px; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div id="sidebar-container"></div>
  
  <main class="main-content">
    <a href="index.html" class="back-link">← 一覧に戻る</a>
    <div id="fixture-content"></div>
  </main>

  <script src="common.js"></script>
  <script>
    initCommonState();
    // 詳細ページはサイドバーの特定のアクティブ状態を持たないため引数なし
    loadSidebar('');

    function renderFixture() {
      const content = document.getElementById('fixture-content');
      const params = new URLSearchParams(window.location.search);
      const id = params.get('ID') || params.get('id');

      let data = JSON.parse(localStorage.getItem('equipmentData') || '[]');
      let cart = JSON.parse(localStorage.getItem('cartItemIds') || '[]');
      const item = data.find(i => i.id === id);
      
      if (!item) {
        content.innerHTML = '<div class="empty-message">機材が見つかりません。</div>';
        return;
      }

      const isAvailable = item.status === "available";
      const inCart = cart.includes(item.id);
      
      let actionHtml = '';
      if (!isAvailable) {
        actionHtml = `<button class="btn btn-disabled" disabled style="max-width: 100%;">現在貸出中です</button>`;
      } else if (inCart) {
        actionHtml = `<button class="btn" style="background:var(--card-bg); border: 2px solid var(--primary-container); max-width: 100%;" onclick="removeFromCart('${item.id}')">カートから外す</button>`;
      } else {
        actionHtml = `<button class="btn btn-primary" style="max-width: 100%;" onclick="addToCart('${item.id}')">カートに入れる</button>`;
      }

      content.innerHTML = `
        <div class="fixture-container">
          <div style="flex: 1; width: 100%;">
            <div class="fixture-image-placeholder">画像プレビューエリア</div>
          </div>
          <div class="fixture-info">
            <span class="item-category" style="margin-bottom: 16px;">${item.category} / ${item.maker}</span>
            <h2 style="font-size: 36px; margin: 0 0 16px 0;">${item.name}</h2>
            <div class="status-container status-${item.status}" style="margin-bottom: 32px;">
              <span class="status-dot"></span>
              <span class="status-text">${isAvailable ? '貸出可能' : '貸出中'}</span>
            </div>
            <p style="line-height: 1.8; margin-bottom: 48px; color: var(--text-sub); font-size: 16px;">${item.desc}</p>
            ${actionHtml}
          </div>
        </div>
      `;
    }

    window.addToCart = (id) => {
      let cart = JSON.parse(localStorage.getItem('cartItemIds') || '[]');
      if (!cart.includes(id)) {
        cart.push(id);
        localStorage.setItem('cartItemIds', JSON.stringify(cart));
      }
      alert('カートに追加しました');
      renderFixture();
    };

    window.removeFromCart = (id) => {
      let cart = JSON.parse(localStorage.getItem('cartItemIds') || '[]');
      cart = cart.filter(i => i !== id);
      localStorage.setItem('cartItemIds', JSON.stringify(cart));
      renderFixture();
    };

    renderFixture();
  </script>
</body>
</html>
