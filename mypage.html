<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ</title>
  <!-- 共通スタイルを読み込み -->
  <link rel="stylesheet" href="common.css">
  <style>
    /* マイページ固有のスタイル */
    .login-input { width: 100%; max-width: 400px; box-sizing: border-box; padding: 16px; font-size: 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 16px; margin-bottom: 24px; outline: none; display: block; }
    .card-panel { background: var(--card-bg); padding: 48px; border-radius: 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); max-width: 600px; }
    .welcome-panel { background: var(--tertiary-container); color: var(--on-tertiary-container); padding: 48px; border-radius: 28px; margin-bottom: 48px; }
  </style>
</head>
<body>

  <!-- サイドバーがここに挿入されます -->
  <div id="sidebar-container"></div>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <h2>アカウント情報</h2>

    <!-- 未ログイン時 -->
    <div id="mypage-login-section" class="card-panel">
      <p style="margin-top: 0; margin-bottom: 24px; color: var(--text-sub); line-height: 1.6;">システムを利用するにはログインしてください。<br>(テスト用: 任意の文字を入力)</p>
      <input type="text" id="username-input" class="login-input" placeholder="ユーザー名">
      <button id="login-btn" class="btn btn-primary">ログイン</button>
    </div>

    <!-- ログイン済み時 -->
    <div id="mypage-user-section" style="display: none;">
      <div class="welcome-panel">
        <p style="margin: 0; font-size: 16px; opacity: 0.8;">ようこそ</p>
        <h3 id="mypage-username" style="margin: 8px 0 32px 0; font-size: 36px;"></h3>
        <button id="logout-btn" class="btn" style="background: var(--card-bg); color: var(--text-main); width: auto;">ログアウト</button>
      </div>

      <h2>現在レンタル中の機材</h2>
      <div id="rented-items-list" class="grid-list"></div>
    </div>
  </main>

  <!-- 共通スクリプトを読み込み -->
  <script src="common.js"></script>
  <script>
    // 初期化処理とサイドバーの読み込み
    initCommonState();
    loadSidebar('mypage');

    const loginSection = document.getElementById('mypage-login-section');
    const userSection = document.getElementById('mypage-user-section');
    const usernameInput = document.getElementById('username-input');

    document.getElementById('login-btn').addEventListener('click', () => {
      if (usernameInput.value.trim() === '') {
        alert('名前を入力してください'); return;
      }
      localStorage.setItem('currentUser', usernameInput.value.trim());
      renderMypage();
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('currentUser');
      renderMypage();
    });

    function renderMypage() {
      const currentUser = localStorage.getItem('currentUser');

      if (!currentUser) {
        loginSection.style.display = 'block';
        userSection.style.display = 'none';
      } else {
        loginSection.style.display = 'none';
        userSection.style.display = 'block';
        document.getElementById('mypage-username').textContent = `${currentUser} さん`;

        const list = document.getElementById('rented-items-list');
        let rented = JSON.parse(localStorage.getItem('rentedItemIds') || '[]');
        let data = JSON.parse(localStorage.getItem('equipmentData') || '[]');
        
        list.innerHTML = '';

        if (rented.length === 0) {
          list.innerHTML = '<div class="empty-message">現在レンタルしている機材はありません。</div>';
        } else {
          rented.forEach(id => {
            const item = data.find(i => i.id === id);
            if(!item) return;
            const div = document.createElement('div');
            div.className = "item-card";
            div.innerHTML = `
              <div>
                <span class="item-category">${item.category} / ${item.maker}</span>
                <h3 class="item-name">${item.name}</h3>
              </div>
              <button class="btn btn-error" style="margin-top:24px; width: 100%;" onclick="returnItem('${item.id}')">返却する</button>
            `;
            list.appendChild(div);
          });
        }
      }
    }

    window.returnItem = (id) => {
      let rented = JSON.parse(localStorage.getItem('rentedItemIds') || '[]');
      let data = JSON.parse(localStorage.getItem('equipmentData') || '[]');
      
      const item = data.find(i => i.id === id);
      if (item) item.status = 'available';
      
      rented = rented.filter(i => i !== id);
      
      localStorage.setItem('equipmentData', JSON.stringify(data));
      localStorage.setItem('rentedItemIds', JSON.stringify(rented));
      
      alert('機材を返却しました。');
      renderMypage();
    };

    renderMypage();
  </script>
</body>
</html>
